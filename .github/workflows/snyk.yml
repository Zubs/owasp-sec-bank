name: Snyk Security Scans
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  snyk_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Snyk and HTML Reporter
        run: npm install -g snyk snyk-to-html

      - name: Snyk Test Insecure Backend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          cd insecure/backend
          npm install
          snyk test --json | snyk-to-html -o ../../snyk_insecure_backend.html
        continue-on-error: true

      - name: Snyk Test Secure Backend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          cd secure/backend
          npm install
          snyk test --json | snyk-to-html -o ../../snyk_secure_backend.html
        continue-on-error: true

      - name: Upload Snyk Reports
        uses: actions/upload-artifact@v4
        with:
          name: Snyk-Comparative-Reports
          path: |
            snyk_insecure_backend.html
            snyk_secure_backend.html
            